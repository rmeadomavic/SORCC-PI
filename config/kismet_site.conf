# Argus Kismet Site Configuration
# Installed by argus-setup.sh to /etc/kismet/kismet_site.conf

# GPS via LTE modem serial NMEA output
gps=serial:device=/dev/ttyUSB1,name=gps,baud=9600

# ── Data Sources ──────────────────────────────────────────────
# Bluetooth (always available on RPi 4)
source=hci0

# WiFi monitor mode (uncomment if using external monitor-mode adapter)
# source=wlan0

# RTL-433 SDR — 433 MHz (TPMS, IoT sensors, weather stations)
# source=rtl433-0:channel=433000000

# RTL-433 SDR — 315 MHz (US/Japanese car TPMS)
# source=rtl433-0:channel=315000000

# ADS-B aircraft tracking (1090 MHz)
# source=rtladsb-00000001
